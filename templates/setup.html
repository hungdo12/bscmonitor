<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BSC Monitor — Setup</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1e2d40;
    --accent: #00e5ff;
    --text: #e2e8f0;
    --muted: #64748b;
    --success: #10b981;
    --error: #ef4444;
    --mono: 'Space Mono', monospace;
    --sans: 'DM Sans', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }
  body::before {
    content: '';
    position: fixed; inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(0,229,255,0.06) 0%, transparent 70%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(124,58,237,0.07) 0%, transparent 70%);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 680px; position: relative; z-index: 1; }
  .header { text-align: center; margin-bottom: 2.5rem; }
  .logo { font-family: var(--mono); font-size: 0.7rem; color: var(--accent); letter-spacing: 0.3em; text-transform: uppercase; margin-bottom: 0.75rem; opacity: 0.8; }
  h1 { font-family: var(--mono); font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #e2e8f0 0%, var(--accent) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; line-height: 1.2; }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 0.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 1.75rem; margin-bottom: 1rem; }
  .card-title { font-family: var(--mono); font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.5rem; }
  .card-title::before { content: ''; display: inline-block; width: 6px; height: 6px; background: var(--accent); border-radius: 50%; }
  .field { margin-bottom: 1.25rem; }
  label { display: block; font-size: 0.8rem; color: var(--muted); margin-bottom: 0.4rem; font-weight: 500; }
  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.8rem;
    padding: 0.65rem 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(0,229,255,0.08); }
  textarea { resize: vertical; min-height: 140px; line-height: 1.7; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
  .preset-tokens { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.75rem; }
  .preset-btn {
    background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-family: var(--mono); font-size: 0.7rem;
    padding: 0.3rem 0.7rem; cursor: pointer; transition: all 0.15s; letter-spacing: 0.05em;
  }
  .preset-btn:hover { border-color: var(--accent); color: var(--accent); }
  .hint { font-size: 0.72rem; color: var(--muted); margin-top: 0.35rem; }
  .wallet-count { font-family: var(--mono); font-size: 0.7rem; color: var(--muted); text-align: right; margin-top: 0.35rem; }
  .btn-start {
    width: 100%;
    background: linear-gradient(135deg, var(--accent) 0%, #00b4d8 100%);
    border: none; border-radius: 10px;
    color: #0a0e1a; font-family: var(--mono); font-size: 0.85rem; font-weight: 700;
    letter-spacing: 0.08em; padding: 0.9rem; cursor: pointer;
    transition: all 0.2s; text-transform: uppercase; margin-top: 0.5rem;
  }
  .btn-start:hover { opacity: 0.9; transform: translateY(-1px); }
  .btn-start:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .status-msg { text-align: center; font-size: 0.8rem; margin-top: 1rem; min-height: 1.2rem; font-family: var(--mono); }
  .status-msg.error { color: var(--error); }
  .status-msg.success { color: var(--success); }
  .status-msg.loading { color: var(--accent); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(0,229,255,0.3); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 6px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="logo">BSC Network Monitor</div>
    <h1>Token Balance<br>Monitor</h1>
    <p class="subtitle">Theo dõi biến động số dư token trên BSC theo thời gian thực</p>
  </div>

  <div class="card">
    <div class="card-title">Token cần theo dõi</div>
    <div class="field">
      <label>Chọn nhanh</label>
      <div class="preset-tokens">
        <button class="preset-btn" onclick="setPreset('0x55d398326f99059fF775485246999027B3197955')">USDT</button>
        <button class="preset-btn" onclick="setPreset('0x8AC76a51cc950d9822D68b83fE1Ad97B32Cd580d')">USDC</button>
        <button class="preset-btn" onclick="setPreset('0xe9e7CEA3DedcA5984780Bafc599bD69ADd087D56')">BUSD</button>
        <button class="preset-btn" onclick="setPreset('0x1AF3F329e8BE154074D8769D1FFa4eE058B1DBc3')">DAI</button>
        <button class="preset-btn" onclick="setPreset('')">Custom</button>
      </div>
    </div>
    <div class="field">
      <label>Contract Address</label>
      <input type="text" id="contract" placeholder="0x55d398326f99059fF775485246999027B3197955"
             value="{{ config.contract if config else '' }}">
      <div class="hint">Dán contract address của bất kỳ token ERC-20 nào trên BSC</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Danh sách ví</div>
    <div class="field">
      <label>Địa chỉ ví (mỗi dòng 1 ví)</label>
      <textarea id="wallets" placeholder="0xAbc123...&#10;0xDef456...&#10;0x789...">{{ '\n'.join(config.wallets) if config else '' }}</textarea>
      <div class="wallet-count" id="walletCount">0 ví hợp lệ</div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Telegram</div>
    <div class="row">
      <div class="field">
        <label>Bot Token</label>
        <input type="text" id="tgToken" placeholder="123456:ABC-DEF..."
               value="{{ config.tg_token if config else '' }}">
      </div>
      <div class="field">
        <label>Chat ID</label>
        <input type="text" id="tgChat" placeholder="1234567890"
               value="{{ config.tg_chat if config else '' }}">
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">Cấu hình quét</div>
    <div class="row">
      <div class="field">
        <label>Quét mỗi (giây)</label>
        <input type="number" id="interval" value="{{ config.interval if config else 60 }}" min="30" max="3600">
      </div>
      <div class="field">
        <label>Số luồng</label>
        <input type="number" id="threads" value="{{ config.num_threads if config else 10 }}" min="1" max="50">
      </div>
    </div>
  </div>

  <button class="btn-start" id="btnStart" onclick="startMonitor()">Bắt đầu theo dõi</button>
  <div class="status-msg" id="statusMsg"></div>
</div>

<script>
function setPreset(addr) {
  document.getElementById('contract').value = addr;
}

document.getElementById('wallets').addEventListener('input', function() {
  const lines = this.value.split('\n').filter(l => {
    const t = l.trim();
    return t && !t.startsWith('#') && t.startsWith('0x') && t.length === 42;
  });
  document.getElementById('walletCount').textContent = lines.length + ' ví hợp lệ';
});

function setStatus(msg, cls) {
  const el = document.getElementById('statusMsg');
  el.className = 'status-msg ' + cls;
  el.innerHTML = msg;
}

async function startMonitor() {
  const contract = document.getElementById('contract').value.trim();
  const wallets  = document.getElementById('wallets').value.trim();
  const tgToken  = document.getElementById('tgToken').value.trim();
  const tgChat   = document.getElementById('tgChat').value.trim();
  const interval = document.getElementById('interval').value;
  const threads  = document.getElementById('threads').value;

  if (!contract) return setStatus('Vui lòng nhập contract address', 'error');
  if (!wallets)  return setStatus('Vui lòng nhập danh sách ví', 'error');
  if (!tgToken)  return setStatus('Vui lòng nhập Telegram Bot Token', 'error');
  if (!tgChat)   return setStatus('Vui lòng nhập Telegram Chat ID', 'error');

  const btn = document.getElementById('btnStart');
  btn.disabled = true;
  setStatus('<span class="spinner"></span>Đang kết nối blockchain & snapshot số dư...', 'loading');

  try {
    const resp = await fetch('/setup', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ contract, wallets, tg_token: tgToken, tg_chat: tgChat,
        interval: parseInt(interval), num_threads: parseInt(threads) })
    });
    const data = await resp.json();
    if (data.ok) {
      setStatus('✓ Đã bắt đầu theo dõi ' + data.total + ' ví — Token: ' + data.symbol, 'success');
      setTimeout(() => window.location.href = '/dashboard', 1200);
    } else {
      setStatus('Lỗi: ' + data.error, 'error');
      btn.disabled = false;
    }
  } catch(e) {
    setStatus('Lỗi kết nối server', 'error');
    btn.disabled = false;
  }
}
</script>
</body>
</html>
